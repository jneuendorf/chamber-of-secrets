services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      # SQLite database persists across container restarts
      - db_data:/app/data
    environment:
      APP_DATABASE_URL: sqlite:////app/data/inventory.db
      APP_CORS_ORIGINS: '["https://localhost"]'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"    # HTTP → HTTPS redirect
      - "443:443"  # HTTPS (TLS terminated by nginx)
    volumes:
      # TLS certificate and key generated by mkcert (see scripts/setup-certs.sh).
      # Run the setup script once before the first `docker compose up`.
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy

  # ── Optional: Cloudflare Tunnel ────────────────────────────────────────────
  # Exposes the app over HTTPS from anywhere without port-forwarding or certs.
  # Useful when you need barcode scanning away from home WiFi.
  #
  # Setup:
  #   1. Create a free tunnel at https://one.dash.cloudflare.com → Networks → Tunnels
  #   2. Copy the tunnel token shown after creation
  #   3. Add CLOUDFLARE_TUNNEL_TOKEN=<token> to a .env file next to compose.yaml
  #   4. In the Cloudflare dashboard, set the tunnel's public hostname to route to:
  #        http://frontend:80
  #   5. Uncomment the block below and run: docker compose up -d cloudflared
  #
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     - frontend

volumes:
  db_data:
