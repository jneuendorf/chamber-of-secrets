# HTTP → HTTPS redirect
server {
    listen 80;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Modern TLS only — drops IE11 and very old Android
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root  /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/ requests to the backend container.
    # No CORS needed — the browser only ever talks to one origin.
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # SPA fallback — any path without a matching static file
    # falls through to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
